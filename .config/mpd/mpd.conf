bind_to_address "/tmp/mpd_socket"
audio_output {
    type "pipewire"
    name "Pipewire Output"
   # mixer_type "software"
}

music_directory    "~/Nhạc"

auto_update "yes"

audio_output {
   type   "fifo"
   name   "my_fifo"
   path   "/tmp/mpd.fifo"
   format "44100:16:2"
}

# Required Files and Directories
#music_directory    "~/Music"
playlist_directory "~/.config/mpd/playlists"
db_file            "~/.config/mpd/database"
log_file           "~/.config/mpd/log"
pid_file           "~/.config/mpd/pid"
state_file         "~/.config/mpd/state"
sticker_file       "~/.config/mpd/sticker.sql"

# Network Settings
#bind_to_address    "localhost" # Change to "any" for remote access
#port               "6600"

# Audio Output (PulseAudio example)
audio_output {
    type           "pulse"
    name           "My Pulse Output"
}

# Optional: Software Volume Control (allows independent MPD volume)
audio_output {
    type           "alsa"
    name           "My ALSA Device"
    mixer_type     "software" 
}

